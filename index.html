<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hola Mundo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: sans-serif;
        color: #f8fafc;
      }

      .card {
        text-align: center;
        padding: 3rem 4rem;
        background: #1e293b;
        border-radius: 1.5rem;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 3rem;
        margin: 0 0 1rem;
      }

      p {
        font-size: 1.25rem;
        color: #94a3b8;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>¡Hola, Mundo!</h1>
      <p>Bienvenido — espero que tengas un día increíble.</p>
    </div>
  </body>
</html>
